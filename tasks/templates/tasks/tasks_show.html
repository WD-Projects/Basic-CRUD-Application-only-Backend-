{% extends "tasks/base.html" %}
{% block show %}
    {% include "tasks/messages.html" %}
    <ul>
        {% for task in tasks %}
            <li>{{ task.title }}</li>
            <li>{{ task.author }}</li>
            <li>{{ task.description }}</li>
            <li>{{ task.rating }}</li>
        {% endfor %}
    </ul>
{% endblock %}
